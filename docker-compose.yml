services:
  # OP-4.2 — one-shot: create the WAL/base archive layout and hand it to the
  # postgres OS user (UID 999) before the archive_command first fires.
  pg_archive_init:
    image: pgvector/pgvector:pg16
    container_name: memory_rag_pg_archive_init
    entrypoint:
      ["sh", "-c", "mkdir -p /archive/wal /archive/base && chown -R 999:999 /archive"]
    volumes:
      - memory_rag_pg_archive:/archive

  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory_rag_pg
    # OP-4.2 — WAL archiving for point-in-time recovery (D-053, D-054).
    # archive_command copies each completed WAL segment into the archive volume:
    #   - `test -f ... ||` makes it idempotent — a re-issued segment exits 0;
    #   - `.tmp` then `mv` keeps a half-written segment from ever appearing
    #     under its final name.
    # A genuine copy failure exits non-zero, so Postgres keeps the segment in
    # pg_wal and retries — no raw WAL is lost. wal_level/archive_mode changes
    # need a restart; archive_command/archive_timeout are reload-able.
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - archive_mode=on
      - -c
      - archive_timeout=300
      - -c
      - "archive_command=test -f /archive/wal/%f || ( cp %p /archive/wal/%f.tmp && mv /archive/wal/%f.tmp /archive/wal/%f )"
    depends_on:
      pg_archive_init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-memory_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - memory_rag_pg_data:/var/lib/postgresql/data
      - memory_rag_pg_archive:/archive
      # OP-4.2 — initdb-time hook: add a `host replication` rule so the
      # pg_backup sidecar can run pg_basebackup over the Compose network.
      - ./configs/postgres/initdb-replication-hba.sh:/docker-entrypoint-initdb.d/10-replication-hba.sh:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memory_rag}"]
      interval: 2s
      timeout: 5s
      retries: 20

  # OP-4.2 — opt-in nightly base-backup runner. Started only with
  # `docker compose --profile backup up -d`; a plain `up` leaves it down.
  pg_backup:
    image: pgvector/pgvector:pg16
    container_name: memory_rag_pg_backup
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-memory_rag}
      BACKUP_WINDOW_START: ${BACKUP_WINDOW_START:-3}
      BACKUP_WINDOW_END: ${BACKUP_WINDOW_END:-5}
      BASE_RETENTION_DAYS: ${BASE_RETENTION_DAYS:-30}
      TZ: ${TZ:-UTC}
    entrypoint: ["sh", "/opt/pg_backup/scheduler.sh"]
    volumes:
      - memory_rag_pg_archive:/archive
      - ./scripts/pg_backup:/opt/pg_backup:ro
    restart: unless-stopped

  # DEPLOY-1.6 / D-065 — opt-in off-box backup uploader. Started only with
  # `docker compose --profile backup up -d`; a plain `up` leaves it down, and
  # the `vps` profile (the installer's bring-up) does NOT start it. Polls the
  # OP-4.2 `pg_backup` durable signal (`/archive/last_success.json`) and
  # mirrors `/archive/base` + `/archive/wal` to the operator-supplied
  # S3-compatible target via `rclone sync`. Best-effort and additive:
  # `pg_backup.cycle.ok` semantics and the OP-4.2 durable signal are never
  # affected by an uploader failure. The uploader writes only
  # `/archive/last_offbox.json` under the archive volume — `/archive/base`,
  # `/archive/wal`, and `/archive/last_success.json` are never written by
  # this service (see scripts/pg_offbox_uploader/uploader.sh).
  pg_offbox_uploader:
    image: rclone/rclone:1.66
    container_name: memory_rag_pg_offbox_uploader
    profiles: ["backup"]
    depends_on:
      pg_backup:
        condition: service_started
    environment:
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      BACKUP_S3_PATH_PREFIX: ${BACKUP_S3_PATH_PREFIX:-archive}
      BACKUP_S3_ACCESS_KEY_ID: ${BACKUP_S3_ACCESS_KEY_ID:-}
      BACKUP_S3_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET_ACCESS_KEY:-}
    entrypoint: ["sh", "/opt/pg_offbox_uploader/uploader.sh"]
    volumes:
      - memory_rag_pg_archive:/archive
      - ./scripts/pg_offbox_uploader:/opt/pg_offbox_uploader:ro
    restart: unless-stopped

  # OP-4.3 — opt-in recovered-cluster runner for restore drills and operator
  # restores (D-055). Started only with `docker compose --profile restore up`.
  # It runs the cluster that `scripts/pg_restore/restore.sh` prepared on the
  # dedicated, throwaway `memory_rag_pg_restore_data` volume — never the live
  # `memory_rag_pg_data`. The archive volume is mounted read-write so restore.sh
  # can write run logs and the result marker under /archive/restore_logs; this
  # cluster has archive_mode off (the default — no `-c` archive flags), so it
  # never writes WAL back into the archive. The host port is kept off 5432 so
  # the recovered cluster never clashes with the live `postgres`.
  pg_restore:
    image: pgvector/pgvector:pg16
    container_name: memory_rag_pg_restore
    profiles: ["restore"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-memory_rag}
    ports:
      - "${RESTORE_PORT:-5433}:5432"
    volumes:
      - memory_rag_pg_restore_data:/var/lib/postgresql/data
      - memory_rag_pg_archive:/archive
      - ./scripts/pg_restore:/opt/pg_restore:ro
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memory_rag}"]
      interval: 2s
      timeout: 5s
      retries: 30

  # DEPLOY-1.2 / D-061 — one-shot: apply OP-1 schema migrations to head.
  # Gated by the `vps` profile so a bare `docker compose up` is byte-equivalent
  # to today (postgres + pg_archive_init only). Runs after `postgres` reports
  # healthy; `app` waits for this service to exit 0 before starting. The
  # migrations runner (`python -m memory_rag.storage.postgres.migrations_runner
  # apply`) is idempotent — a database already at head is left untouched.
  app_init:
    build:
      context: .
      dockerfile: Dockerfile
    image: memory_rag_app
    container_name: memory_rag_app_init
    profiles: ["vps"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      STORAGE_BACKEND: postgres
    command:
      ["python", "-m", "memory_rag.storage.postgres.migrations_runner", "apply"]
    restart: "no"

  # DEPLOY-1.2 / D-061 — FastAPI app behind uvicorn. Gated by the `vps`
  # profile. The host port is bound to 127.0.0.1 only — public reachability
  # + TLS land with DEPLOY-1.3 (reverse proxy / ACME). STORAGE_BACKEND and
  # POSTGRES_HOST are set at the compose level so the VPS contour boots with
  # the real Postgres backend (the canonical `_verify_pgvector` boot gate
  # then succeeds once `app_init` has applied migration 0001's
  # `CREATE EXTENSION vector`).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: memory_rag_app
    container_name: memory_rag_app
    profiles: ["vps"]
    depends_on:
      app_init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      STORAGE_BACKEND: postgres
    command:
      ["uvicorn", "memory_rag.app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  # DEPLOY-1.3 / D-062 — public reverse-proxy + ACME automation in front of
  # the DEPLOY-1.2 `app` service. Gated by the `vps` profile so a bare
  # `docker compose up` stays byte-equivalent to today. Operator-facing
  # knobs PUBLIC_HOSTNAME and ACME_EMAIL flow in from .env; with either
  # empty / invalid the public-TLS contour does not come up cleanly and
  # there is no HTTP-only fallback (see configs/caddy/Caddyfile).
  #
  # The `app` service above keeps its 127.0.0.1:8000:8000 loopback publish
  # as an operator-only bypass-the-proxy inspection path on the VPS host —
  # it is NOT a closure signal for the DEPLOY-1.3 public-TLS contour. The
  # decisive evidence is `https://$PUBLIC_HOSTNAME/health` + the
  # HTTP -> HTTPS redirect on :80, documented in
  # docs/RUNBOOK.md "Reverse-proxy + TLS contour (DEPLOY-1.3 / D-062)".
  caddy:
    image: caddy:2-alpine
    container_name: memory_rag_caddy
    profiles: ["vps"]
    depends_on:
      app:
        condition: service_started
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    restart: unless-stopped

volumes:
  memory_rag_pg_data:
  memory_rag_pg_archive:
  memory_rag_pg_restore_data:
  caddy_data:
  caddy_config:
