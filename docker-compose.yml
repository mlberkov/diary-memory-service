services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memory_rag_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-memory_rag}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - memory_rag_pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-memory_rag}"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  memory_rag_pg_data:
